# Serve the SPA and reverse-proxy API + WebSocket traffic to the gateway.
#
# Both plain HTTP (80) and HTTPS (443, self-signed) are served. The microphone
# (getUserMedia) requires a secure context, so use the HTTPS endpoint for the
# live-mic feature; file upload and everything else work over either.

# Shared proxy/location rules for both server blocks.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
    location /v1/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
    location /metrics { proxy_pass http://api:8000; }
    location /healthz { proxy_pass http://api:8000; }
    location /readyz  { proxy_pass http://api:8000; }
}

server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/hearsay.crt;
    ssl_certificate_key /etc/nginx/certs/hearsay.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        try_files $uri $uri/ /index.html;
    }
    location /v1/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
    location /metrics { proxy_pass http://api:8000; }
    location /healthz { proxy_pass http://api:8000; }
    location /readyz  { proxy_pass http://api:8000; }
}
